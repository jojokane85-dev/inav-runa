name: Build CADDXF405 RUNA Firmware

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3

      - name: Clone INAV
        run: |
          git clone --branch 8.0.1 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir build
          cd build
          cmake ..

      - name: Build CADDXF405 4.5 Wing
        run: |
          cd inav/build
          make CADDXF405_45_WING -j$(nproc)

      - name: Find built firmware
        run: |
          echo "Built firmware files:"
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print

      - name: Patch RUNA name in HEX
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = [
              (b"CADDXF405_45_WING", b"CADDXF405+RUNA_45"),
              (b"CADDXF405_WING", b"CADDXF405+RUNA"),
          ]

          for old, new in replacements:
              if len(old) != len(new):
                  raise SystemExit(f"Length mismatch: {old}={len(old)} {new}={len(new)}")

          out = Path("out")
          out.mkdir(exist_ok=True)

          hex_files = list(Path("inav/build").rglob("*CADDXF405_45_WING*.hex"))
          if not hex_files:
              hex_files = list(Path("inav/build").rglob("*.hex"))

          if not hex_files:
              raise SystemExit("No HEX files found")

          src = hex_files[0]
          print("Using HEX:", src)

          records = []
          memory = {}
          base = 0

          def parse_record(line):
              count = int(line[1:3], 16)
              addr = int(line[3:7], 16)
              rectype = int(line[7:9], 16)
              data = bytes.fromhex(line[9:9 + count * 2])
              return count, addr, rectype, data

          for line in src.read_text().splitlines():
              if not line.startswith(":"):
                  records.append((line, None))
                  continue

              count, addr, rectype, data = parse_record(line)
              records.append((line, (count, addr, rectype, data, base)))

              if rectype == 0:
                  absolute = base + addr
                  for i, b in enumerate(data):
                      memory[absolute + i] = b
              elif rectype == 4:
                  base = int.from_bytes(data, "big") << 16
              elif rectype == 2:
                  base = int.from_bytes(data, "big") << 4

          if not memory:
              raise SystemExit("No data records found")

          min_addr = min(memory)
          max_addr = max(memory)
          image = bytearray([0xFF] * (max_addr - min_addr + 1))

          for addr, b in memory.items():
              image[addr - min_addr] = b

          patched_any = False

          for old, new in replacements:
              pos = image.find(old)
              if pos >= 0:
                  abs_pos = min_addr + pos
                  print(f"Patching {old.decode()} -> {new.decode()} at {hex(abs_pos)}")
                  for i, b in enumerate(new):
                      memory[abs_pos + i] = b
                  patched_any = True
              else:
                  print(f"Not found: {old.decode()}")

          if not patched_any:
              raise SystemExit("No CADDXF405 target string found in HEX")

          def checksum(record_bytes):
              return ((~sum(record_bytes) + 1) & 0xFF)

          patched_lines = []

          for line, info in records:
              if info is None:
                  patched_lines.append(line)
                  continue

              count, addr, rectype, data, rec_base = info

              if rectype == 0:
                  absolute = rec_base + addr
                  new_data = bytes(memory[absolute + i] for i in range(count))

                  rec = bytearray()
                  rec.append(count)
                  rec.append((addr >> 8) & 0xFF)
                  rec.append(addr & 0xFF)
                  rec.append(rectype)
                  rec.extend(new_data)
                  chk = checksum(rec)

                  patched_lines.append(":" + rec.hex().upper() + f"{chk:02X}")
              else:
                  patched_lines.append(line)

          dst = out / "CADDXF405_RUNA.hex"
          dst.write_text("\n".join(patched_lines) + "\n")
          print("patched HEX written:", dst)
          PY

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: CADDXF405-RUNA-Firmware
          path: out/CADDXF405_RUNA.hex
