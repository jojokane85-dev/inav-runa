name: Find CADDXF405 Target

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3

      - name: Clone INAV
        run: |
          git clone --branch 8.0.1 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir build
          cd build
          cmake ..

      - name: Show CADDX targets
        run: |
          cd inav/build

          echo "===== make help CADDX/CADDY/CAD targets ====="
          make help | grep -i -E "CAD|CADD|CADDX|CADDY|XF405|F405" || true

          echo ""
          echo "===== target folders CADDX/CADDY/CAD ====="
          find ../src/main/target -maxdepth 2 -type d | grep -i -E "CAD|CADD|CADDX|CADDY|XF405|F405" || true

          echo ""
          echo "===== all SPEEDY / CADDX / F405 related folders ====="
          find ../src/main/target -maxdepth 2 -type d | grep -i -E "SPEEDY|CAD|CADD|F405|WING" || true

          exit 1
