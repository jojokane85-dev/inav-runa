name: Build INAV SpeedyBee RUNA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git build-essential python3 python3-pip \
          gcc-arm-none-eabi libnewlib-arm-none-eabi \
          binutils-arm-none-eabi make

      - name: Clone INAV
        run: |
          git clone --branch 8.0.1 https://github.com/iNavFlight/inav.git

      - name: Patch name
        run: |
          cd inav
          sed -i 's/SPEEDYBEEF405WING/SPEEDYBEEF405+RUNA/g' $(grep -rl "SPEEDYBEEF405WING" src || true)

      - name: Build firmware
        run: |
          cd inav
          make SPEEDYBEEF405WING -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-FW
          path: inav/obj/**/*
