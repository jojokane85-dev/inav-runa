name: Build RUNA Firmware

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3

      - name: Clone INAV
        run: |
          git clone --branch 8.0.1 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir build
          cd build
          cmake ..

      - name: Build only SpeedyBee F405 Wing
        run: |
          cd inav/build
          make SPEEDYBEEF405WING -j$(nproc)

      - name: Find built firmware
        run: |
          echo "Built firmware files:"
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print

      - name: Patch HEX safely
        run: |
          python3 <<'PY'
          from pathlib import Path

          old = b"SPEEDYBEEF405WING"
          new = b"SPEEDYBEF405+RUNA"  # same length: 17 bytes

          out = Path("out")
          out.mkdir(exist_ok=True)

          hex_files = list(Path("inav/build").rglob("*SPEEDYBEEF405WING*.hex"))

          if not hex_files:
              hex_files = list(Path("inav/build").rglob("*.hex"))

          if not hex_files:
              raise SystemExit("No HEX files found")

          src = hex_files[0]
          print("Using HEX:", src)

          def checksum(record_bytes):
              return ((~sum(record_bytes) + 1) & 0xFF)

          patched_lines = []
          patched = False

          for line in src.read_text().splitlines():
              if not line.startswith(":"):
                  patched_lines.append(line)
                  continue

              count = int(line[1:3], 16)
              addr = int(line[3:7], 16)
              rectype = int(line[7:9], 16)
              data_hex = line[9:9 + count * 2]
              data = bytes.fromhex(data_hex)

              if rectype == 0 and old in data:
                  data = data.replace(old, new)
                  patched = True

                  rec = bytearray()
                  rec.append(len(data))
                  rec.append((addr >> 8) & 0xFF)
                  rec.append(addr & 0xFF)
                  rec.append(rectype)
                  rec.extend(data)
                  chk = checksum(rec)

                  line = ":" + rec.hex().upper() + f"{chk:02X}"

              patched_lines.append(line)

          if not patched:
              raise SystemExit("Target string not found inside HEX records")

          dst = out / "RUNA.hex"
          dst.write_text("\n".join(patched_lines) + "\n")
          print("patched HEX written:", dst)
          PY

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-Firmware
          path: out/RUNA.hex
