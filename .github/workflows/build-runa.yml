name: Find INAV Targets

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git build-essential

      - name: Clone INAV
        run: |
          git clone https://github.com/iNavFlight/inav.git
          cd inav
          git checkout 8.0.1

      - name: Show targets
        run: |
          cd inav
          find src/main/target -maxdepth 2 -type d | grep -i "F405\|SPEEDY\|MATEK"
          exit 1
