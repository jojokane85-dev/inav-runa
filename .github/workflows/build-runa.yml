name: build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: install
        run: |
          sudo apt update
          sudo apt install -y git make gcc-arm-none-eabi

      - name: clone
        run: |
          git clone https://github.com/iNavFlight/inav.git
          cd inav
          git checkout 8.0.1

      - name: build
        run: |
          cd inav
          find src/main/target -maxdepth 2 -type d | grep -i "F405\|SPEEDY\|MATEK"
exit 1

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: inav/obj
