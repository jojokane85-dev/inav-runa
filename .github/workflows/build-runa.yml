name: Build RUNA Firmware

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git build-essential python3 cmake gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Clone INAV
        run: |
          git clone https://github.com/iNavFlight/inav.git
          cd inav
          git checkout 8.0.1

      - name: Build firmware
        run: |
          cd inav
          mkdir build
          cd build
          cmake .. -DTARGET=SPEEDYBEEF405WING
          make -j$(nproc)

      - name: Patch firmware name
        run: |
          python3 - <<'PY'
          from pathlib import Path
          old = b"SPEEDYBEEF405WING"
          new = b"SPEEDYBEEF405+RUNA"
          for f in list(Path("inav").rglob("*.bin")) + list(Path("inav").rglob("*.hex")):
              data = f.read_bytes()
              if old in data:
                  f.write_bytes(data.replace(old, new))
                  print("patched", f)
          PY

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: SPEEDYBEEF405-RUNA
          path: |
            inav/**/*.bin
            inav/**/*.hex
