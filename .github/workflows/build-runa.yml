name: Build RUNA Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git build-essential gcc-arm-none-eabi make

    - name: Clone INAV
      run: |
        git clone https://github.com/iNavFlight/inav.git
        cd inav
        git checkout 8.0.1

    - name: Build firmware
      run: |
        cd inav
        make SPEEDYBEEF405 -j$(nproc)

    - name: Rename firmware
      run: |
        cd inav
        cp obj/SPEEDYBEEF405/SPEEDYBEEF405.hex RUNA.hex

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: RUNA-Firmware
        path: inav/RUNA.hex
